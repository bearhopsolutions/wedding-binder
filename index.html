<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nichole &amp; Kevin — Wedding Binder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💍</text></svg>">
<style>
  :root{
    --black:#16171c;
    --black-soft:#212330;
    --white:#ffffff;
    --offwhite:#faf8f6;
    --line:#e7e2df;
    --teal:#0f766e;
    --teal-light:#14b8a6;
    --teal-bg:#e6f5f3;
    --purple:#6d28d9;
    --purple-light:#9d5ce0;
    --purple-bg:#f2eafc;
    --text:#232323;
    --muted:#767585;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Segoe UI',Calibri,-apple-system,Arial,sans-serif;
    background:var(--offwhite);
    color:var(--text);
    display:flex;
    min-height:100vh;
  }
  /* ---------- Sidebar ---------- */
  #sidebar{
    width:270px;
    flex:0 0 270px;
    background:var(--black);
    color:#f2f1f6;
    display:flex;
    flex-direction:column;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
    z-index:60;
  }
  #sidebar .brand{
    padding:22px 20px 14px 20px;
    border-bottom:1px solid #2c2e3a;
  }
  #sidebar .brand .names{
    font-family:Georgia,'Times New Roman',serif;
    font-size:22px;
    letter-spacing:.5px;
    color:#fff;
  }
  #sidebar .brand .sub{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--teal-light);
    margin-top:4px;
  }
  #sidebar nav{flex:1;padding:10px 0 20px 0;}
  #sidebar .group-title{
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:1.3px;
    color:#8b8a9a;
    padding:16px 20px 6px 20px;
  }
  #sidebar button.navbtn{
    display:block;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    color:#d8d7e2;
    padding:9px 20px;
    font-size:13.5px;
    cursor:pointer;
    border-left:3px solid transparent;
  }
  #sidebar button.navbtn:hover{background:#20222d;color:#fff;}
  #sidebar button.navbtn.active{
    background:linear-gradient(90deg, rgba(20,184,166,.18), rgba(157,92,224,.10));
    border-left:3px solid var(--teal-light);
    color:#fff;
    font-weight:600;
  }
  #sidebar .savebox{
    padding:14px 18px;
    border-top:1px solid #2c2e3a;
    font-size:11px;
    color:#9291a3;
  }
  #sidebar .savebox b{color:var(--teal-light);}
  #sidebar .syncstatus{margin-top:6px;padding-top:6px;border-top:1px solid #2c2e3a;}
  #sidebar .syncstatus.ok{color:var(--teal-light);}
  #sidebar .syncstatus.err{color:#e08a8a;}
  #sidebar .syncstatus.off{color:#8b8a9a;}

  #hamburger{
    display:none;
    background:var(--black);
    color:#fff;
    border:none;
    border-radius:6px;
    width:38px;height:38px;
    font-size:18px;
    cursor:pointer;
    flex:0 0 auto;
  }
  #sidebar-backdrop{
    display:none;
    position:fixed;inset:0;
    background:rgba(10,10,14,.55);
    z-index:55;
  }
  #sidebar-backdrop.show{display:block;}

  /* ---------- Main ---------- */
  #main{flex:1;min-width:0;display:flex;flex-direction:column;}
  #topbar{
    background:var(--white);
    border-bottom:1px solid var(--line);
    padding:14px 34px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    position:sticky;
    top:0;
    z-index:5;
  }
  #topbar h1{
    font-family:Georgia,serif;
    font-size:19px;
    margin:0;
    color:var(--black);
    font-weight:normal;
  }
  #topbar .tools{display:flex;gap:8px;flex-wrap:wrap;}
  .btn{
    font-size:12.5px;
    padding:7px 13px;
    border-radius:6px;
    border:1px solid var(--line);
    background:var(--white);
    color:var(--text);
    cursor:pointer;
  }
  .btn:hover{border-color:var(--teal);color:var(--teal);}
  .btn.primary{background:var(--teal);border-color:var(--teal);color:#fff;}
  .btn.primary:hover{background:#0b5c56;color:#fff;}
  .btn.purple{background:var(--purple);border-color:var(--purple);color:#fff;}
  .btn.purple:hover{background:#5b21b6;color:#fff;}

  #content{padding:30px 40px 80px 40px;max-width:1000px;}
  .page{display:none;}
  .page.active{display:block;}

  .page-head{margin-bottom:22px;border-bottom:2px solid var(--black);padding-bottom:12px;}
  .page-head h2{
    font-family:Georgia,serif;
    font-size:28px;
    margin:0 0 4px 0;
    color:var(--black);
  }
  .page-head .desc{color:var(--muted);font-size:13.5px;max-width:720px;}
  .kicker{
    display:inline-block;
    font-size:10.5px;
    letter-spacing:1.4px;
    text-transform:uppercase;
    color:var(--purple);
    background:var(--purple-bg);
    padding:3px 9px;
    border-radius:20px;
    margin-bottom:8px;
  }

  .card{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:10px;
    padding:22px 24px;
    margin-bottom:22px;
  }
  .card h3{
    font-size:15px;
    margin:0 0 14px 0;
    color:var(--teal);
    border-bottom:1px solid var(--teal-bg);
    padding-bottom:8px;
    text-transform:uppercase;
    letter-spacing:.6px;
  }
  .card h3.purple-h{color:var(--purple);border-bottom-color:var(--purple-bg);}
  .card p.note{color:var(--muted);font-size:12.5px;margin-top:-8px;margin-bottom:14px;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;}
  .grid.g3{grid-template-columns:1fr 1fr 1fr;}
  .field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
  .field label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .field input[type=text],.field input[type=date],.field input[type=tel],.field input[type=email],.field input[type=number],.field select,.field textarea{
    font-family:inherit;
    font-size:14px;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--offwhite);
    color:var(--text);
  }
  .field textarea{resize:vertical;min-height:70px;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--teal-light);background:#fff;}

  .stat-row{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:6px;}
  .stat{
    flex:1;min-width:120px;
    background:var(--black);
    color:#fff;
    border-radius:10px;
    padding:14px 16px;
    text-align:center;
  }
  .stat .num{font-size:24px;font-weight:700;color:var(--teal-light);}
  .stat .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#c9c8d6;margin-top:2px;}
  .stat.purple .num{color:var(--purple-light);}

  .progress-wrap{background:var(--line);border-radius:20px;height:10px;overflow:hidden;margin:6px 0 14px 0;}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--purple));width:0%;}

  /* checklist */
  .group-block{margin-bottom:18px;}
  .group-block h4{
    font-size:12.5px;text-transform:uppercase;letter-spacing:.8px;
    color:#fff;background:var(--black-soft);
    display:inline-block;padding:4px 12px;border-radius:20px;margin:0 0 10px 0;
  }
  .todo-row,.chk-row{
    display:flex;align-items:flex-start;gap:10px;
    padding:8px 6px;border-bottom:1px solid var(--offwhite);
  }
  .todo-row:hover,.chk-row:hover{background:var(--offwhite);}
  .todo-row input[type=checkbox],.chk-row input[type=checkbox]{
    margin-top:3px;width:16px;height:16px;accent-color:var(--teal);flex:0 0 auto;cursor:pointer;
  }
  .todo-row.done label,.chk-row.done label{text-decoration:line-through;color:var(--muted);}
  .todo-row .task{flex:1;min-width:0;}
  .todo-row label,.chk-row label{font-size:13.5px;cursor:pointer;line-height:1.4;}
  .tag{
    display:inline-block;font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;
    padding:1px 7px;border-radius:10px;margin-left:6px;position:relative;top:-1px;
  }
  .tag.owner{background:var(--teal-bg);color:var(--teal);}
  .tag.priority-high{background:var(--purple-bg);color:var(--purple);}
  .tag.priority-medium{background:#fdf1de;color:#a8681a;}
  .tag.priority-low{background:#eef0f2;color:#767585;}
  .todo-row .noteinput{
    width:220px;font-size:12px;padding:5px 8px;border:1px solid var(--line);border-radius:5px;background:#fff;flex:0 0 auto;
  }

  table.datatable{width:100%;border-collapse:collapse;margin-top:4px;}
  table.datatable th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;
    color:var(--muted);border-bottom:2px solid var(--black);padding:6px 8px;
  }
  table.datatable td{padding:4px 6px;border-bottom:1px solid var(--line);vertical-align:middle;}
  table.datatable input,table.datatable select{
    width:100%;border:1px solid transparent;background:transparent;font-size:13px;padding:6px 6px;border-radius:5px;font-family:inherit;
  }
  table.datatable input:focus,table.datatable select:focus{background:var(--offwhite);border-color:var(--teal-light);outline:none;}
  table.datatable tr:hover td{background:var(--offwhite);}
  .rowdel{background:none;border:none;color:#c23;cursor:pointer;font-size:15px;padding:2px 6px;}
  .addrow-btn{margin-top:10px;}
  .draghandle{width:44px;text-align:center;white-space:nowrap;}
  .draghandle .grip{cursor:grab;color:var(--muted);font-size:15px;user-select:none;padding:2px 4px;}
  .draghandle .grip:active{cursor:grabbing;}
  .draghandle .rowmove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:1px 3px;line-height:1;}
  .draghandle .rowmove:hover{color:var(--teal);}
  table.datatable tr.dragging{opacity:.35;}
  table.datatable tr.dragover td{box-shadow:inset 0 2px 0 var(--teal);}
  table.datatable td.checkcell{text-align:center;width:34px;}
  table.datatable td.checkcell input{width:auto;}
  table.datatable tr.rowdone input:not([type="checkbox"]){text-decoration:line-through;color:var(--muted);}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
  @media (max-width:880px){.two-col,.three-col,.grid,.grid.g3{grid-template-columns:1fr;}}

  .coord-flag{
    background:var(--black);color:#fff;border-radius:10px;padding:16px 20px;margin-bottom:20px;
    display:flex;gap:14px;align-items:center;
  }
  .coord-flag .dot{width:10px;height:10px;border-radius:50%;background:var(--teal-light);flex:0 0 auto;}
  .coord-flag b{color:var(--purple-light);}

  footer.pagefoot{color:var(--muted);font-size:11px;margin-top:28px;text-align:center;}

  /* ---------- Lock screen ---------- */
  #lockscreen{
    position:fixed;inset:0;z-index:200;
    background:linear-gradient(160deg, var(--black) 0%, #262038 60%, var(--purple) 140%);
    display:flex;align-items:center;justify-content:center;
    padding:20px;
  }
  #lockscreen .box{
    background:var(--white);
    border-radius:14px;
    padding:36px 32px;
    width:100%;max-width:360px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
  }
  #lockscreen .names{font-family:Georgia,serif;font-size:24px;color:var(--black);}
  #lockscreen .sub{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--teal);margin:4px 0 22px 0;}
  #lockscreen input[type=password]{
    width:100%;font-size:16px;padding:12px 14px;border:1px solid var(--line);border-radius:8px;
    background:var(--offwhite);text-align:center;letter-spacing:2px;margin-bottom:12px;
  }
  #lockscreen input[type=password]:focus{outline:2px solid var(--teal-light);background:#fff;}
  #lockscreen button{
    width:100%;padding:11px;border-radius:8px;border:none;
    background:var(--teal);color:#fff;font-size:14px;cursor:pointer;
  }
  #lockscreen button:hover{background:#0b5c56;}
  #lockscreen .err{color:#c0392b;font-size:12.5px;min-height:16px;margin-top:10px;}
  body.locked #sidebar,body.locked #main{display:none;}

  /* ---------- Mobile ---------- */
  @media (max-width:880px){
    #hamburger{display:inline-block;}
    #sidebar{
      position:fixed;top:0;left:0;
      width:270px;max-width:82vw;
      transform:translateX(-100%);
      transition:transform .25s ease;
      box-shadow:2px 0 24px rgba(0,0,0,.3);
    }
    #sidebar.open{transform:translateX(0);}
    #topbar{padding:12px 16px;}
    #topbar h1{font-size:16px;}
    #content{padding:18px 16px 60px 16px;}
    .page-head h2{font-size:22px;}
    .todo-row{flex-wrap:wrap;}
    .todo-row .noteinput{width:100%;margin-left:26px;margin-top:4px;}
    .stat-row{gap:8px;}
    .stat{min-width:44%;padding:12px 10px;}
    .card{padding:16px 14px;}
  }

  /* Print */
  @media print{
    #sidebar,#topbar,#lockscreen,#sidebar-backdrop{display:none !important;}
    body{display:block;}
    #content{padding:0;max-width:100%;}
    .page{display:block !important;page-break-after:always;}
    .card{break-inside:avoid;border:1px solid #ccc;}
    .btn,.rowdel,.addrow-btn,.draghandle{display:none !important;}
  }
</style>
</head>
<body class="locked">

<div id="lockscreen">
  <div class="box">
    <div class="names">Nichole &amp; Kevin</div>
    <div class="sub">Wedding Binder — Private</div>
    <form id="lockform" autocomplete="off">
      <input type="password" id="lockpass" placeholder="Enter passcode" autocomplete="off">
      <button type="submit">Unlock</button>
      <div class="err" id="lockerr"></div>
    </form>
  </div>
</div>

<div id="sidebar-backdrop" onclick="closeSidebar()"></div>

<aside id="sidebar">
  <div class="brand">
    <div class="names">Nichole &amp; Kevin</div>
    <div class="sub">Wedding Binder</div>
  </div>
  <nav id="navlist"></nav>
  <div class="savebox">
    <div id="savebox">Autosaving to this browser…</div>
    <div class="syncstatus off" id="syncstatus">☁ Cloud sync not configured yet</div>
  </div>
</aside>

<div id="main">
  <div id="topbar">
    <button id="hamburger" onclick="toggleSidebar()" aria-label="Menu">☰</button>
    <h1 id="pagetitle">Welcome</h1>
    <div class="tools">
      <button class="btn" onclick="window.print()">🖶 Print This Page</button>
      <button class="btn" onclick="printAll()">🖶 Print Entire Binder</button>
      <button class="btn" onclick="exportBackup()">⭳ Export Backup</button>
      <button class="btn" onclick="document.getElementById('importFile').click()">⭱ Import Backup</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(event)">
    </div>
  </div>
  <div id="content"></div>
</div>

const STORAGE_KEY = "np_wedding_binder_v1";
const TOKEN_KEY = STORAGE_KEY + "_token";

/* Pure-JS hash (cyrb53) so the lock screen works over file:// too, where
   Web Crypto's subtle API is unavailable (it requires a secure context). */
function cyrb53(str, seed = 0) {
  let h1 = 0xdeadbeef ^ seed, h2 = 0x41c6ce57 ^ seed;
  for (let i = 0, ch; i < str.length; i++) {
    ch = str.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 2654435761);
    h2 = Math.imul(h2 ^ ch, 1597334677);
  }
  h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
  h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
  return (4294967296 * (2097151 & h2) + (h1 >>> 0)).toString(16);
}

/* ---------- Cloud sync (Google Sheets via Apps Script Web App) ----------
   Fill in SHEETS_WEBAPP_URL after deploying the Apps Script (see README).
   Until it's set, the binder silently falls back to browser-only storage. */
const SHEETS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzkozdttPzMdYXibarbR4fMo0l9eYrenXO6Mckc-wSTibvVd7wagwDK0sWLwIS_wjBY/exec";

function updateSyncStatus(cls, text){
  const el2 = document.getElementById("syncstatus");
  if(!el2) return;
  el2.className = "syncstatus " + cls;
  el2.textContent = "☁ " + text;
}

function cloudLoad(){
  if(!SHEETS_WEBAPP_URL){
    updateSyncStatus("off", "Cloud sync not configured yet");
    return Promise.resolve(null);
  }
  const token = localStorage.getItem(TOKEN_KEY) || "";
  updateSyncStatus("off", "Connecting to Google Sheets…");
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 12000);
  return fetch(SHEETS_WEBAPP_URL + "?token=" + encodeURIComponent(token), {method:"GET", signal:ctrl.signal})
    .then(r=>r.json())
    .then(data=>{
      clearTimeout(timer);
      if(data && data.error){
        updateSyncStatus("err", "Cloud sync rejected — check the passcode/token");
        return null;
      }
      if(data && typeof data === "object" && Object.keys(data).length){
        updateSyncStatus("ok", "Synced from Google Sheets");
        return data;
      }
      updateSyncStatus("ok", "Connected — no cloud data yet");
      return null;
    })
    .catch(()=>{
      clearTimeout(timer);
      updateSyncStatus("err", "Couldn't reach Google Sheets — using local copy");
      return null;
    });
}

let cloudSaveTimer = null;
function cloudSave(){
  if(!SHEETS_WEBAPP_URL) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(()=>{
    const token = localStorage.getItem(TOKEN_KEY) || "";
    updateSyncStatus("off", "Syncing to Google Sheets…");
    fetch(SHEETS_WEBAPP_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"}, // avoids a CORS preflight Apps Script can't handle
      body: JSON.stringify({token, data: state}),
    })
      .then(r=>r.json())
      .then(res=>{
        if(res && res.ok) updateSyncStatus("ok", "Synced to Google Sheets");
        else updateSyncStatus("err", "Sync rejected — check the passcode/token");
      })
      .catch(()=> updateSyncStatus("err", "Couldn't reach Google Sheets — will retry on next edit"));
  }, 1200);
}

function HOURS(){
  const out=[];
  for(let h=6; h<=21; h++){
    const label = h<=12 ? (h+" AM") : ((h-12)+" PM");
    out.push(h===12?"12 PM":label);
  }
  return out;
}

let state = loadState();

function loadState(){
  let saved = {};
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) saved = JSON.parse(raw);
  }catch(e){ console.warn("Could not read saved binder data", e); }
  const merged = deepMerge(DEFAULT_STATE, saved);
  if(!merged.tables) merged.tables = {};
  return merged;
}

function deepMerge(base, override){
  if(Array.isArray(base)) return override !== undefined ? override : base;
  if(base && typeof base === "object"){
    const result = {...base};
    if(override && typeof override === "object"){
      for(const k of Object.keys(override)){
        result[k] = deepMerge(base[k], override[k]);
      }
    }
    return result;
  }
  return override !== undefined ? override : base;
}

let saveTimer=null;
function flushSave(){
  clearTimeout(saveTimer);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  const box = document.getElementById("savebox");
  if(box){
    const t = new Date();
    box.innerHTML = "Saved to this browser at <b>"+t.toLocaleTimeString()+"</b>";
  }
}
function persist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 250);
  cloudSave();
}
window.addEventListener("beforeunload", flushSave);
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="hidden") flushSave(); });

function getTable(id){
  if(!state.tables[id]){
    state.tables[id] = JSON.parse(JSON.stringify(TABLE_DEFAULTS[id] || [[]]));
  }
  return state.tables[id];
}
function getChecklist(id){
  if(!state.checklists[id]) state.checklists[id] = {};
  return state.checklists[id];
}

function el(tag, attrs, children){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs){
    const v = attrs[k];
    if(v === null || v === undefined) continue; // e.g. readonly:null must NOT become the string "null"
    if(k==="html") e.innerHTML = v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  (children||[]).forEach(c=>{ if(c) e.appendChild(c); });
  return e;
}

function bindField(pathParts){
  // returns {get, set} for state via array of keys
  return {
    get(){ let o=state; for(const p of pathParts) o=o?.[p]; return o ?? ""; },
    set(v){ let o=state; for(let i=0;i<pathParts.length-1;i++) o=o[pathParts[i]]; o[pathParts[pathParts.length-1]]=v; persist(); }
  };
}

function textField(container, label, pathParts, type, opts){
  type = type || "text";
  const wrap = el("div",{class:"field"});
  wrap.appendChild(el("label",{},[document.createTextNode(label)]));
  let input;
  if(type==="textarea"){
    input = el("textarea",opts||{});
  } else {
    input = el("input",Object.assign({type:type},opts||{}));
  }
  const b = bindField(pathParts);
  input.value = b.get();
  input.addEventListener("input", ()=>b.set(input.value));
  wrap.appendChild(input);
  container.appendChild(wrap);
  return input;
}

function renderSimpleChecklist(container, listId, groups, showAddNote){
  const cl = getChecklist(listId);
  groups.forEach((g, gi)=>{
    const block = el("div",{class:"group-block"});
    block.appendChild(el("h4",{},[document.createTextNode(g.group)]));
    g.items.forEach((item,ii)=>{
      const slug = gi+"_"+ii;
      const row = el("div",{class:"chk-row"+(cl[slug]?" done":"")});
      const cb = el("input",{type:"checkbox", id:listId+"_"+slug});
      cb.checked = !!cl[slug];
      cb.addEventListener("change", ()=>{
        cl[slug]=cb.checked;
        row.classList.toggle("done",cb.checked);
        persist();
      });
      const lbl = el("label",{for:listId+"_"+slug},[document.createTextNode(item)]);
      row.appendChild(cb); row.appendChild(lbl);
      block.appendChild(row);
    });
    container.appendChild(block);
  });
}

function renderTodoList(container){
  const cl = getChecklist("todo");
  const notes = state.notes.todo || (state.notes.todo = {});
  let currentPhase = null;
  let block = null;
  TODO_RAW.forEach((row, i)=>{
    const [phase, eventName, category, task, priority, owner, defaultNote] = row;
    if(phase !== currentPhase){
      currentPhase = phase;
      block = el("div",{class:"group-block"});
      block.appendChild(el("h4",{},[document.createTextNode(phase)]));
      container.appendChild(block);
    }
    const slug = "t"+i;
    const rowEl = el("div",{class:"todo-row"+(cl[slug]?" done":"")});
    const cb = el("input",{type:"checkbox", id:"todo_"+slug});
    cb.checked = !!cl[slug];
    cb.addEventListener("change", ()=>{
      cl[slug]=cb.checked;
      rowEl.classList.toggle("done", cb.checked);
      updateTodoProgress();
      persist();
    });
    const taskWrap = el("div",{class:"task"});
    const lbl = el("label",{for:"todo_"+slug});
    lbl.innerHTML = task
      + ' <span class="tag owner">'+owner+'</span>'
      + ' <span class="tag priority-'+priority.toLowerCase()+'">'+priority+'</span>'
      + (eventName!=="General/Planning" ? ' <span class="tag owner" style="background:var(--purple-bg);color:var(--purple)">'+eventName+'</span>' : '');
    taskWrap.appendChild(lbl);
    const noteInput = el("input",{type:"text", class:"noteinput", placeholder: defaultNote || "notes / date"});
    noteInput.value = notes[slug] ?? "";
    noteInput.addEventListener("input", ()=>{ notes[slug]=noteInput.value; persist(); });
    rowEl.appendChild(cb); rowEl.appendChild(taskWrap); rowEl.appendChild(noteInput);
    block.appendChild(rowEl);
  });
}

function updateTodoProgress(){
  const cl = getChecklist("todo");
  const done = Object.values(cl).filter(Boolean).length;
  const total = TODO_RAW.length;
  const bar = document.getElementById("todoProgressBar");
  const lbl = document.getElementById("todoProgressLabel");
  if(bar){ bar.style.width = Math.round(done/total*100)+"%"; }
  if(lbl){ lbl.textContent = done+" of "+total+" tasks complete ("+Math.round(done/total*100)+"%)"; }
}

function renderTable(container, tableId, columns, opts){
  opts = opts || {};
  const rows = getTable(tableId);
  const wrap = el("div",{style:"overflow-x:auto"});
  const table = el("table",{class:"datatable"});
  const thead = el("thead");
  const trh = el("tr");
  if(!opts.noReorder) trh.appendChild(el("th",{class:"draghandle"},[]));
  columns.forEach(c=> trh.appendChild(el("th",{},[document.createTextNode(c.label)])) );
  if(!opts.noDelete) trh.appendChild(el("th",{},[]));
  thead.appendChild(trh); table.appendChild(thead);
  const tbody = el("tbody");

  let dragFrom = null;

  function moveRow(from, to){
    if(to<0 || to>=rows.length || from===to) return;
    const [moved] = rows.splice(from,1);
    rows.splice(to,0,moved);
    persist();
    renderRows();
  }

  function renderRows(){
    tbody.innerHTML = "";
    rows.forEach((rowArr, ri)=>{
      const tr = el("tr");
      if(opts.strikeCol!==undefined && rowArr[opts.strikeCol]) tr.classList.add("rowdone");

      if(!opts.noReorder){
        const handleTd = el("td",{class:"draghandle"});
        handleTd.appendChild(el("span",{class:"grip", title:"Drag to reorder"},[document.createTextNode("⠿")]));
        handleTd.appendChild(el("button",{class:"rowmove", title:"Move up", onclick:()=>moveRow(ri,ri-1)},[document.createTextNode("▲")]));
        handleTd.appendChild(el("button",{class:"rowmove", title:"Move down", onclick:()=>moveRow(ri,ri+1)},[document.createTextNode("▼")]));
        tr.draggable = true;
        tr.addEventListener("dragstart", (e)=>{
          dragFrom = ri;
          tr.classList.add("dragging");
          if(e.dataTransfer){ e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", String(ri)); }
        });
        tr.addEventListener("dragend", ()=>{ tr.classList.remove("dragging"); dragFrom=null; });
        tr.addEventListener("dragover", (e)=>{ e.preventDefault(); if(e.dataTransfer) e.dataTransfer.dropEffect="move"; tr.classList.add("dragover"); });
        tr.addEventListener("dragleave", ()=> tr.classList.remove("dragover"));
        tr.addEventListener("drop", (e)=>{
          e.preventDefault();
          tr.classList.remove("dragover");
          if(dragFrom===null || dragFrom===ri) return;
          moveRow(dragFrom, ri);
        });
        tr.appendChild(handleTd);
      }

      columns.forEach((c, ci)=>{
        const td = el("td");
        let field;
        if(c.type==="select"){
          field = el("select");
          (c.options||[]).forEach(optVal=>{
            const o = el("option",{value:optVal},[document.createTextNode(optVal)]);
            if(rowArr[ci]===optVal) o.selected=true;
            field.appendChild(o);
          });
          field.addEventListener("input", ()=>{ rowArr[ci]=field.value; persist(); });
          field.addEventListener("change", ()=>{ rowArr[ci]=field.value; persist(); });
        } else if(c.type==="checkbox"){
          field = el("input",{type:"checkbox"});
          field.checked = !!rowArr[ci];
          field.addEventListener("change", ()=>{
            rowArr[ci]=field.checked;
            if(opts.strikeCol===ci) tr.classList.toggle("rowdone", field.checked);
            persist();
          });
          td.classList.add("checkcell");
        } else {
          field = el("input",{type:c.type||"text", readonly: c.readonly?"readonly":null});
          field.value = rowArr[ci] ?? "";
          field.addEventListener("input", ()=>{ rowArr[ci]=field.value; persist(); });
          field.addEventListener("change", ()=>{ rowArr[ci]=field.value; persist(); });
        }
        td.appendChild(field);
        tr.appendChild(td);
      });
      if(!opts.noDelete){
        const td = el("td");
        const del = el("button",{class:"rowdel", title:"Remove row", onclick:()=>{
          rows.splice(ri,1); persist(); renderRows();
        }},[document.createTextNode("✕")]);
        td.appendChild(del);
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    });
  }
  renderRows();
  table.appendChild(tbody);
  wrap.appendChild(table);
  container.appendChild(wrap);

  if(!opts.noAdd){
    const addBtn = el("button",{class:"btn addrow-btn", onclick:()=>{
      rows.push(columns.map(c=> c.type==="checkbox" ? false : ""));
      persist();
      renderRows();
    }},[document.createTextNode("+ Add Row")]);
    container.appendChild(addBtn);
  }
}

function refreshSnapshotStats(){
  const box = document.getElementById("snapStats");
  if(!box) return;
  box.innerHTML="";
  const iso = state.snapshot.weddingDateISO;
  let daysLeft = "—", niceDate="Not set";
  if(iso){
    const wed = new Date(iso+"T00:00:00");
    const now = new Date(); now.setHours(0,0,0,0);
    daysLeft = Math.round((wed-now)/86400000);
    niceDate = wed.toLocaleDateString(undefined,{weekday:"long", year:"numeric", month:"long", day:"numeric"});
  }
  const stats = [
    [daysLeft, daysLeft===1? "Day To Go" : "Days To Go", false],
    [niceDate, "Wedding Date", true],
    [state.snapshot.guestCount || "—", "Estimated Guests", false],
    [state.snapshot.totalBudget ? "$"+Number(state.snapshot.totalBudget).toLocaleString() : "—", "Total Budget", true],
  ];
  stats.forEach(([num,lbl,purple])=>{
    box.appendChild(el("div",{class:"stat"+(purple?" purple":"")},[
      el("div",{class:"num", style: typeof num==="string" && num.length>10 ? "font-size:15px":""},[document.createTextNode(num)]),
      el("div",{class:"lbl"},[document.createTextNode(lbl)]),
    ]));
  });
}

/* ============================================================
   NAV / INIT
   ============================================================ */
const PAGE_TITLES = {};
function buildNav(){
  const nav = document.getElementById("navlist");
  SECTIONS.forEach(sec=>{
    nav.appendChild(el("div",{class:"group-title"},[document.createTextNode(sec.group)]));
    sec.items.forEach(item=>{
      PAGE_TITLES[item.id] = item.label.replace(/&amp;/g,"&");
      const btn = el("button",{class:"navbtn", id:"nav_"+item.id, html:item.label, onclick:()=>showPage(item.id)});
      nav.appendChild(btn);
    });
  });
}

function showPage(id){
  document.querySelectorAll(".navbtn").forEach(b=>b.classList.remove("active"));
  const navBtn = document.getElementById("nav_"+id);
  if(navBtn) navBtn.classList.add("active");
  document.getElementById("pagetitle").textContent = PAGE_TITLES[id] || "";
  const content = document.getElementById("content");
  content.innerHTML = "";
  let page = document.getElementById("page_"+id);
  const wrap = el("div",{class:"page active", id:"page_"+id});
  content.appendChild(wrap);
  if(PAGE_BUILDERS[id]) PAGE_BUILDERS[id](wrap);
  wrap.appendChild(el("footer",{class:"pagefoot"},[document.createTextNode("Nichole & Kevin — Wedding Binder")]));
  localStorage.setItem(STORAGE_KEY+"_lastpage", id);
  window.scrollTo(0,0);
  closeSidebar();
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebar-backdrop").classList.toggle("show");
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-backdrop").classList.remove("show");
}

function printAll(){
  const content = document.getElementById("content");
  const savedHTML = content.innerHTML;
  content.innerHTML = "";
  SECTIONS.forEach(sec=>{
    sec.items.forEach(item=>{
      const wrap = el("div",{class:"page active", id:"printpage_"+item.id});
      content.appendChild(wrap);
      if(PAGE_BUILDERS[item.id]) PAGE_BUILDERS[item.id](wrap);
    });
  });
  window.print();
  setTimeout(()=>{ content.innerHTML = savedHTML; }, 300);
}

function exportBackup(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "wedding-binder-backup-"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  URL.revokeObjectURL(url);
}

function importBackup(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const imported = JSON.parse(reader.result);
      state = deepMerge(DEFAULT_STATE, imported);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      alert("Backup restored! Reloading the binder now.");
      location.reload();
    }catch(e){
      alert("That file couldn't be read as a binder backup.");
    }
  };
  reader.readAsText(file);
  evt.target.value = "";
}

/* ============================================================
   GATE + STARTUP
   ============================================================ */
function initApp(){
  buildNav();
  cloudLoad().then(cloudData=>{
    if(cloudData){
      state = deepMerge(DEFAULT_STATE, cloudData);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    const startPage = localStorage.getItem(STORAGE_KEY+"_lastpage") || "welcome";
    showPage(PAGE_BUILDERS[startPage] ? startPage : "welcome");
  });
}

function unlock(passcode){
  localStorage.setItem(TOKEN_KEY, passcode);
  document.body.classList.remove("locked");
  document.getElementById("lockscreen").style.display = "none";
  initApp();
}

const savedToken = localStorage.getItem(TOKEN_KEY);
if(savedToken && cyrb53(savedToken) === GATE_HASH){
  unlock(savedToken);
} else {
  document.getElementById("lockform").addEventListener("submit", function(e){
    e.preventDefault();
    const val = document.getElementById("lockpass").value;
    if(cyrb53(val) === GATE_HASH){
      unlock(val);
    } else {
      document.getElementById("lockerr").textContent = "Incorrect passcode. Try again.";
      document.getElementById("lockpass").value = "";
      document.getElementById("lockpass").focus();
    }
  });
  document.getElementById("lockpass").focus();
}
</script>
